<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" role="img" aria-label="Paperwork Switzerland terminal demo">
  <title>Paperwork Switzerland — terminal demo</title>
  <defs>
    <style>
      .bg { fill: #1d1f21; }
      .chrome { fill: #2d3033; }
      .dot-r { fill: #ff5f56; }
      .dot-y { fill: #ffbd2e; }
      .dot-g { fill: #27c93f; }
      text { font-family: "SFMono-Regular", "Menlo", "Consolas", "Liberation Mono", monospace; font-size: 14px; }
      .prompt { fill: #50fa7b; }
      .cmd { fill: #f8f8f2; }
      .dim { fill: #8a8d92; }
      .accent { fill: #ff79c6; }
      .ok { fill: #8be9fd; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="600" height="350" rx="8" ry="8"/>
  <rect class="chrome" x="0" y="0" width="600" height="28" rx="8" ry="8"/>
  <rect class="chrome" x="0" y="20" width="600" height="8"/>
  <circle class="dot-r" cx="16" cy="14" r="6"/>
  <circle class="dot-y" cx="34" cy="14" r="6"/>
  <circle class="dot-g" cx="52" cy="14" r="6"/>
  <text x="300" y="18" text-anchor="middle" class="dim">paperwork-switzerland</text>

  <text x="16" y="56"><tspan class="prompt">$</tspan> <tspan class="cmd">paperwork-switzerland help</tspan></text>

  <text x="16" y="84" class="dim">Skills (6):</text>
  <text x="16" y="104"><tspan class="accent">  fiduciaire</tspan>        <tspan class="dim">Bookkeeping, VAT, payroll, year-end (CO 957ff)</tspan></text>
  <text x="16" y="122"><tspan class="accent">  expert-fiscal</tspan>     <tspan class="dim">LIFD + 26 cantonal regimes, frontalier, 3a</tspan></text>
  <text x="16" y="140"><tspan class="accent">  controleur-afc</tspan>    <tspan class="dim">Simulated FTA / ESTV tax audit</tspan></text>
  <text x="16" y="158"><tspan class="accent">  reviseur-agree</tspan>    <tspan class="dim">CO 727 / 727a audit, FAOA standards</tspan></text>
  <text x="16" y="176"><tspan class="accent">  notaire-cantonal</tspan>  <tspan class="dim">Latin / free / mixed notarial systems</tspan></text>
  <text x="16" y="194"><tspan class="accent">  regie</tspan>             <tspan class="dim">Leases (CO 253ff), PPE, OFL reference rate</tspan></text>

  <text x="16" y="222" class="dim">Cantons:</text>
  <text x="16" y="242"><tspan class="ok">  ZH AG AI AR BE BL BS FR GE GL GR JU LU NE NW OW SG SH SO SZ TG TI UR VD VS ZG</tspan></text>
  <text x="16" y="260"><tspan class="ok">  + ZH = 26 / 26</tspan>  <tspan class="dim">all official languages (de / fr / it / rm)</tspan></text>

  <text x="16" y="296" class="dim">Calculators: vat, ifd, pm, compare, mutation, vat-threshold, ahv, bvg, pro-rata.</text>

  <text x="16" y="328"><tspan class="prompt">$</tspan> <tspan class="cmd"> </tspan><tspan class="cmd" x="36" y="328">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>&#9612;</tspan></text>
</svg>
