name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  node-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run node --test
        run: node --test scripts/tests/
      - name: Skill metadata check
        run: node scripts/check-skill-metadata.js
