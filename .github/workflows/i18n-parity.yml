name: i18n-parity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Check i18n parity
        run: node scripts/check-i18n-parity.js
